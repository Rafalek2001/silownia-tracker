<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#12110f"/>
<title>GymTracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#12110f; --s1:#1c1a17; --s2:#252219; --s3:#2e2a22;
  --border:#3a342b; --border2:#4a4238;
  --acc:#c87c45; --asoft:#1f1710;
  --text:#ede6da; --sub:#8a7d6e; --faint:#56493c;
  --red:#c46060; --green:#7aad87; --purple:#a08ec8;
  --r:13px; --ih:56px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100dvh;padding-bottom:72px;overscroll-behavior:none;}

/* HEADER */
.hdr{padding:52px 20px 14px;}
.hdr h1{font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:2px;color:var(--acc);line-height:1;}
.hdr p{font-size:12px;color:var(--sub);margin-top:3px;}

/* STREAK */
.streak-wrap{padding:0 20px 16px;}
.streak-bar{display:flex;gap:5px;align-items:flex-end;justify-content:center;}
.streak-day{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;}
.streak-dot{width:100%;aspect-ratio:1;border-radius:6px;background:var(--s2);border:1px solid var(--border);transition:background .2s;}
.streak-dot.done-A{background:#c87c4566;border-color:var(--acc);}
.streak-dot.done-B{background:#7aad8766;border-color:var(--green);}
.streak-dot.done-AB{background:linear-gradient(135deg,#c87c4566 50%,#7aad8766 50%);border-color:var(--border2);}
.streak-dot.today{box-shadow:0 0 0 1.5px var(--acc);}
.streak-dlbl{font-size:9px;color:var(--faint);text-transform:uppercase;letter-spacing:.3px;}
.streak-legend{display:flex;gap:12px;justify-content:center;margin-top:8px;}
.streak-leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--sub);}
.streak-leg-dot{width:8px;height:8px;border-radius:3px;}

/* TABS */
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 20px 20px;}
.tab{background:var(--s1);border:1.5px solid var(--border);border-radius:var(--r);padding:12px 15px;cursor:pointer;text-align:left;transition:all .18s;}
.tab.on{background:var(--asoft);border-color:var(--acc);}
.tab-name{font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:1px;color:var(--faint);transition:color .18s;}
.tab.on .tab-name{color:var(--acc);}
.tab-ct{font-size:11px;color:var(--faint);margin-top:2px;}

/* SUB NAV */
.snav{display:flex;gap:6px;padding:0 20px 18px;}
.snb{flex:1;background:var(--s1);border:1px solid var(--border);border-radius:100px;color:var(--sub);font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;padding:8px 8px;cursor:pointer;transition:all .15s;text-align:center;}
.snb.on{background:var(--s2);border-color:var(--acc);color:var(--acc);}

.sec{padding:0 20px;display:none;}
.sec.on{display:block;}
.sv{display:none;}
.sv.on{display:block;}

/* DATE + REPEAT ROW */
.top-row{display:flex;align-items:center;gap:8px;margin-bottom:16px;}
.top-row label{font-size:12px;color:var(--sub);white-space:nowrap;}
.dinp{background:var(--s2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;padding:9px 12px;outline:none;flex:1;-webkit-appearance:none;transition:border-color .15s;}
.dinp:focus{border-color:var(--acc);}
.btn-repeat{background:var(--s2);border:1px solid var(--border);border-radius:10px;color:var(--sub);font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;padding:9px 12px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;}
.btn-repeat:active{border-color:var(--acc);color:var(--acc);}

/* EXERCISE CARD */
.exl{display:flex;flex-direction:column;gap:10px;}
.exc{background:var(--s1);border:1.5px solid var(--border);border-radius:var(--r);overflow:visible;transition:border-color .15s;}
.exc.open{border-color:var(--border2);}
.exh{display:flex;align-items:center;padding:13px 13px;gap:10px;cursor:pointer;user-select:none;}
.exni{background:transparent;border:none;font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;color:var(--text);flex:1;outline:none;min-width:0;padding:0;}
.exni::placeholder{color:var(--faint);}
.exch{font-size:15px;color:var(--faint);transition:transform .2s;flex-shrink:0;}
.exc.open .exch{transform:rotate(180deg);}

/* LAST SESSION HINT */
.last-hint{margin:0 13px 10px;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:9px 12px;display:none;}
.exc.open .last-hint{display:block;}
.last-hint-label{font-size:10px;color:var(--acc);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px;font-weight:600;}
.last-hint-sets{display:flex;flex-wrap:wrap;gap:4px;}
.lhs{font-size:12px;color:var(--sub);background:var(--s3);border-radius:6px;padding:3px 9px;}

.exb{display:none;padding:0 13px 13px;}
.exc.open .exb{display:block;}
.exdiv{height:1px;background:var(--border);margin-bottom:12px;}

/* SETS TABLE */
.stbl{width:100%;border-collapse:collapse;}
.stbl th{font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.5px;font-weight:500;padding-bottom:8px;text-align:center;}
.stbl th:first-child{text-align:left;width:28px;}
.stbl th:last-child{width:30px;}
.stbl td{padding:5px 0;vertical-align:middle;text-align:center;}
.stbl td:first-child{text-align:left;}
.snum{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--faint);}

/* в•ђв•ђ iOS-STYLE DRUM PICKER в•ђв•ђ
   Inspired by UIPickerView: tall items, strong snap, momentum,
   gradient mask that creates the "infinite scroll" illusion,
   and a selection band (two hairlines) at dead center.
*/
.drum-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;}
.drum{
  position:relative;
  width:100%;
  height:var(--ih);          /* one visible item = selection zone */
  overflow:hidden;
  border-radius:10px;
  background:var(--s2);
  border:1px solid var(--border);
  cursor:grab;
  touch-action:none;         /* we handle all touch ourselves */
  user-select:none;
  -webkit-user-select:none;
}
/* selection-band hairlines вЂ” exactly like iOS Clock */
.drum::before,.drum::after{
  content:'';position:absolute;left:8px;right:8px;height:1px;
  background:var(--border2);z-index:3;pointer-events:none;
}
.drum::before{top:calc(50% - 1px);}
.drum::after{bottom:calc(50% - 1px);}
/* top+bottom gradient fade */
.drum-fade{
  position:absolute;inset:0;z-index:2;pointer-events:none;
  background:linear-gradient(
    to bottom,
    var(--s2) 0%,
    transparent 35%,
    transparent 65%,
    var(--s2) 100%
  );
}
.drum-list{
  position:absolute;
  left:0;right:0;
  /* top is set by JS: offset so item 0 sits at center */
  display:flex;flex-direction:column;
  will-change:transform;
}
.drum-item{
  height:var(--ih);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:600;
  color:var(--faint);
  transition:color .08s;
  flex-shrink:0;
}
.drum-item.sel{color:var(--text);font-size:22px;}
.drum-label{font-size:10px;color:var(--faint);letter-spacing:.4px;text-transform:uppercase;}

.bdel{background:none;border:none;color:var(--red);font-size:18px;cursor:pointer;opacity:.35;padding:4px 2px;}
.bdel:active{opacity:1;}

/* ADD SET */
.badd-set{margin-top:10px;background:transparent;border:1px dashed var(--border);border-radius:10px;color:var(--sub);font-family:'Outfit',sans-serif;font-size:13px;padding:11px;width:100%;cursor:pointer;transition:border-color .15s,color .15s;}
.badd-set:active{border-color:var(--acc);color:var(--acc);}

.notef{margin-top:10px;background:var(--s2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;padding:10px 12px;width:100%;outline:none;resize:none;min-height:50px;transition:border-color .15s;}
.notef:focus{border-color:var(--acc);}
.notef::placeholder{color:var(--faint);}
.bdel-ex{background:none;border:none;color:var(--red);font-size:12px;font-family:'Outfit',sans-serif;cursor:pointer;margin-top:10px;opacity:.35;display:flex;align-items:center;gap:4px;}
.bdel-ex:active{opacity:1;}

/* ADD EXERCISE / SAVE */
.badd-ex{margin-top:12px;background:var(--s1);border:1.5px dashed var(--border);border-radius:var(--r);color:var(--acc);font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;padding:15px;width:100%;cursor:pointer;opacity:.8;display:flex;align-items:center;justify-content:center;gap:6px;}
.badd-ex:active{background:var(--s2);opacity:1;}
.bsave{margin-top:18px;background:var(--asoft);border:1.5px solid var(--acc);border-radius:var(--r);color:var(--acc);font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1.5px;padding:17px;width:100%;cursor:pointer;transition:background .15s;}
.bsave:active{background:#2a1a0a;}

/* HISTORY */
.he{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:12px 13px;margin-bottom:8px;}
.he-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.hd{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--acc);}
.he-actions{display:flex;gap:6px;}
.hbtn{background:var(--s2);border:1px solid var(--border);border-radius:8px;font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;padding:5px 11px;cursor:pointer;transition:all .15s;}
.hbtn-edit{color:var(--acc);}
.hbtn-edit:active{background:var(--asoft);border-color:var(--acc);}
.hbtn-del{color:var(--red);}
.hbtn-del:active{background:#2a1010;border-color:var(--red);}
.hn{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px;}
.hs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:2px;}
.sp{background:var(--s2);border-radius:6px;padding:3px 9px;font-size:11px;color:var(--sub);}
.hnote{color:var(--faint);font-style:italic;font-size:12px;margin-top:4px;}
.empty{color:var(--faint);font-size:13px;text-align:center;padding:32px 0;}

/* EDIT MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.modal{background:var(--s1);border:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:88dvh;overflow-y:auto;padding:20px 18px 40px;}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--acc);letter-spacing:1px;margin-bottom:16px;}
.modal-ex{margin-bottom:16px;}
.modal-ex-name{background:var(--s2);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;padding:9px 12px;width:100%;outline:none;margin-bottom:8px;transition:border-color .15s;}
.modal-ex-name:focus{border-color:var(--acc);}
.modal-set-row{display:grid;grid-template-columns:22px 1fr 1fr 30px;gap:8px;align-items:center;margin-bottom:6px;}
.modal-set-num{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--faint);text-align:center;}
.modal-inp{background:var(--s2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;text-align:center;padding:8px 4px;width:100%;outline:none;-webkit-appearance:none;transition:border-color .15s;}
.modal-inp:focus{border-color:var(--acc);}
.modal-inp-lbl{font-size:10px;color:var(--faint);text-align:center;margin-top:2px;letter-spacing:.3px;}
.modal-inp-wrap{display:flex;flex-direction:column;}
.modal-del-set{background:none;border:none;color:var(--red);font-size:18px;cursor:pointer;opacity:.4;padding:2px;}
.modal-del-set:active{opacity:1;}
.modal-add-set{background:transparent;border:1px dashed var(--border);border-radius:8px;color:var(--sub);font-family:'Outfit',sans-serif;font-size:12px;padding:8px;width:100%;cursor:pointer;margin-top:4px;margin-bottom:12px;}
.modal-add-set:active{border-color:var(--acc);color:var(--acc);}
.modal-note{background:var(--s2);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;padding:9px 12px;width:100%;outline:none;resize:none;min-height:46px;margin-top:4px;transition:border-color .15s;}
.modal-note:focus{border-color:var(--acc);}
.modal-note::placeholder{color:var(--faint);}
.modal-divider{height:1px;background:var(--border);margin:10px 0 14px;}
.modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:18px;}
.modal-cancel{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);color:var(--sub);font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;padding:14px;cursor:pointer;}
.modal-save{background:var(--asoft);border:1.5px solid var(--acc);border-radius:var(--r);color:var(--acc);font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;padding:14px;cursor:pointer;}
.modal-save:active{background:#2a1a0a;}

/* PROGRESS */
.psel{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;padding:12px 13px;width:100%;outline:none;margin-bottom:16px;-webkit-appearance:none;}
.cc{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:12px;}
.cl{font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.cb{position:relative;width:100%;height:170px;}

/* TOAST */
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--s2);border:1px solid var(--acc);color:var(--acc);font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;padding:11px 22px;border-radius:100px;transition:transform .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="hdr"><h1>GymTracker</h1><p>TwГіj dziennik treningГіw</p></div>

<div class="streak-wrap"><div class="streak-bar" id="streak-bar"></div></div>

<div class="tabs">
  <button class="tab on" onclick="switchTab('A')"><div class="tab-name">Trening A</div><div class="tab-ct" id="ct-A">0 Д‡wiczeЕ„</div></button>
  <button class="tab" onclick="switchTab('B')"><div class="tab-name">Trening B</div><div class="tab-ct" id="ct-B">0 Д‡wiczeЕ„</div></button>
</div>

<div class="sec on" id="sec-A">
  <div class="snav">
    <button class="snb on" onclick="switchSub('A','w')">Trening</button>
    <button class="snb" onclick="switchSub('A','h')">Historia</button>
    <button class="snb" onclick="switchSub('A','p')">Progres</button>
  </div>
  <div class="sv on" id="sv-A-w">
    <div class="top-row">
      <label>Data</label>
      <input type="date" class="dinp" id="dt-A"/>
      <button class="btn-repeat" onclick="repeatLast('A')">в†є PowtГіrz</button>
    </div>
    <div class="exl" id="exl-A"></div>
    <button class="badd-ex" onclick="addEx('A')">пј‹ Dodaj Д‡wiczenie</button>
    <button class="bsave" onclick="saveW('A')">ZAPISZ TRENING A</button>
  </div>
  <div class="sv" id="sv-A-h"><div id="hist-A"></div></div>
  <div class="sv" id="sv-A-p">
    <select class="psel" id="psel-A" onchange="renderProg('A')"><option value="">вЂ” wybierz Д‡wiczenie вЂ”</option></select>
    <div id="pc-A"></div>
  </div>
</div>

<div class="sec" id="sec-B">
  <div class="snav">
    <button class="snb on" onclick="switchSub('B','w')">Trening</button>
    <button class="snb" onclick="switchSub('B','h')">Historia</button>
    <button class="snb" onclick="switchSub('B','p')">Progres</button>
  </div>
  <div class="sv on" id="sv-B-w">
    <div class="top-row">
      <label>Data</label>
      <input type="date" class="dinp" id="dt-B"/>
      <button class="btn-repeat" onclick="repeatLast('B')">в†є PowtГіrz</button>
    </div>
    <div class="exl" id="exl-B"></div>
    <button class="badd-ex" onclick="addEx('B')">пј‹ Dodaj Д‡wiczenie</button>
    <button class="bsave" onclick="saveW('B')">ZAPISZ TRENING B</button>
  </div>
  <div class="sv" id="sv-B-h"><div id="hist-B"></div></div>
  <div class="sv" id="sv-B-p">
    <select class="psel" id="psel-B" onchange="renderProg('B')"><option value="">вЂ” wybierz Д‡wiczenie вЂ”</option></select>
    <div id="pc-B"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="modal-bg" id="modal-bg" style="display:none" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-title" id="modal-title">Edytuj trening</div>
    <div id="modal-body"></div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">ANULUJ</button>
      <button class="modal-save" onclick="saveEdit()">ZAPISZ</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
/* в”Ђв”Ђв”Ђ STATE в”Ђв”Ђв”Ђ */
let S={A:[],B:[]};
let CH={};
const LS=k=>{try{return JSON.parse(localStorage.getItem(k)||'null')}catch(e){return null}};
const LSW=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
function loadS(){ const d=LS('gt5'); if(d&&d.A){S=d;return;} const old=LS('gt4')||LS('gt3'); if(old&&old.A)S=old; }
function saveS(){LSW('gt5',S);}
function getH(){ let h=LS('gt5h'); if(!h||!h.length){ h=LS('gt4h')||LS('gt3h')||[]; if(h.length)LSW('gt5h',h); } return h||[]; }
function setH(h){LSW('gt5h',h);}

/* в”Ђв”Ђв”Ђ DRUM PICKER (iOS-style) в”Ђв”Ђв”Ђ */
// Options arrays
const IH = 56; // item height in px вЂ” must match --ih CSS var
const REPS_OPTS = ['вЂ”',...Array.from({length:50},(_,i)=>i+1)];
const KG_OPTS   = ['вЂ”',...Array.from({length:201},(_,i)=>i)]; // 0вЂ“200 kg, step 1

function createDrum(opts, initVal, onChange) {
  // find initial index
  let initIdx = opts.findIndex(o => String(o) === String(initVal));
  if(initIdx < 0) initIdx = 0;

  let currentIdx = initIdx;

  const wrap = document.createElement('div');
  wrap.className = 'drum-wrap';

  const drum = document.createElement('div');
  drum.className = 'drum';

  const fade = document.createElement('div');
  fade.className = 'drum-fade';
  drum.appendChild(fade);

  const list = document.createElement('div');
  list.className = 'drum-list';

  opts.forEach((o, i) => {
    const item = document.createElement('div');
    item.className = 'drum-item' + (i === initIdx ? ' sel' : '');
    item.textContent = o === 'вЂ”' ? 'вЂ”' : String(o);
    list.appendChild(item);
  });
  drum.appendChild(list);

  // Position so selected item is centred
  // offset = -(idx * IH) + 0  (items start at top of list)
  // centre correction: list top = IH/2 - idx*IH  в†’ item centre aligns with drum centre
  function setPos(idx, animated) {
    const y = IH/2 - idx * IH - IH/2;
    // use transform for performance
    list.style.transition = animated ? 'transform .25s cubic-bezier(.25,.46,.45,.94)' : 'none';
    list.style.transform = `translateY(${y}px)`;
  }

  function highlight(idx) {
    list.querySelectorAll('.drum-item').forEach((el, i) => {
      el.classList.toggle('sel', i === idx);
    });
  }

  setPos(initIdx, false);

  // в”Ђв”Ђ Touch handling в”Ђв”Ђ
  let startY = 0;
  let startIdx = initIdx;
  let lastY = 0;
  let velocity = 0;
  let lastTime = 0;
  let rafId = null;
  let isDragging = false;

  function clamp(i) { return Math.max(0, Math.min(opts.length - 1, i)); }

  function snapTo(idx, animated) {
    idx = clamp(Math.round(idx));
    currentIdx = idx;
    setPos(idx, animated);
    highlight(idx);
    const val = opts[idx] === 'вЂ”' ? '' : String(opts[idx]);
    onChange(val);
  }

  drum.addEventListener('touchstart', e => {
    e.preventDefault();
    if(rafId) cancelAnimationFrame(rafId);
    isDragging = true;
    startY = e.touches[0].clientY;
    lastY = startY;
    startIdx = currentIdx;
    velocity = 0;
    lastTime = Date.now();
    list.style.transition = 'none';
  }, {passive: false});

  drum.addEventListener('touchmove', e => {
    e.preventDefault();
    if(!isDragging) return;
    const y = e.touches[0].clientY;
    const dy = y - lastY;
    const dt = Date.now() - lastTime;
    velocity = dt > 0 ? dy / dt : 0;
    lastY = y;
    lastTime = Date.now();

    const delta = startY - y;
    const idxDelta = delta / IH;
    const rawIdx = startIdx + idxDelta;
    // apply rubber-band at edges
    const clamped = clamp(rawIdx);
    const rubber = rawIdx !== clamped ? (rawIdx - clamped) * 0.2 : 0;
    const finalIdx = clamped + rubber;
    const translateY = IH/2 - finalIdx * IH - IH/2;
    list.style.transform = `translateY(${translateY}px)`;

    // live highlight nearest
    highlight(clamp(Math.round(finalIdx)));
  }, {passive: false});

  drum.addEventListener('touchend', e => {
    e.preventDefault();
    isDragging = false;

    const delta = startY - lastY;
    const idxDelta = delta / IH;
    // momentum: velocity in items/ms
    const momentumItems = -velocity * 120; // tuned for feel
    let targetIdx = startIdx + idxDelta + momentumItems;
    snapTo(targetIdx, true);
  }, {passive: false});

  // Label below
  const lbl = document.createElement('div');
  lbl.className = 'drum-label';

  wrap.append(drum, lbl);
  return {el: wrap, setLabel: t => lbl.textContent = t};
}

/* в”Ђв”Ђв”Ђ TABS / SUBS в”Ђв”Ђв”Ђ */
function switchTab(t){
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('on',(i===0&&t==='A')||(i===1&&t==='B')));
  ['A','B'].forEach(x=>document.getElementById('sec-'+x).classList.toggle('on',x===t));
}
function switchSub(t,v){
  ['w','h','p'].forEach(x=>document.getElementById('sv-'+t+'-'+x).classList.toggle('on',x===v));
  document.querySelectorAll('#sec-'+t+' .snb').forEach((b,i)=>b.classList.toggle('on',['w','h','p'][i]===v));
  if(v==='h')renderHist(t);
  if(v==='p'){fillSelect(t);renderProg(t);}
}

/* в”Ђв”Ђв”Ђ STREAK в”Ђв”Ђв”Ђ */
function renderStreak(){
  const bar = document.getElementById('streak-bar');
  bar.innerHTML = '';
  const h = getH();
  const days = 7;
  const today = new Date();
  const DAY_MS = 86400000;

  for(let i = days-1; i >= 0; i--) {
    const d = new Date(today - i * DAY_MS);
    const iso = d.toISOString().slice(0,10);
    const dayLabel = ['N','Pn','Wt','Ељr','Cz','Pt','So'][d.getDay()];

    const hasA = h.some(e => e.tab==='A' && e.iso===iso);
    const hasB = h.some(e => e.tab==='B' && e.iso===iso);
    const isToday = i === 0;

    // icon: A=dumbbell orange, B=green, both=both, none=empty
    let icon = '';
    if(hasA && hasB) icon = '<span style="font-size:13px">рџ”Ґ</span>';
    else if(hasA) icon = '<span style="font-size:13px;filter:hue-rotate(0deg)">рџ’ЄрџЏ»</span>';
    else if(hasB) icon = '<span style="font-size:13px">рџ’ЄрџЏ»</span>';

    const col = document.createElement('div');
    col.className = 'streak-day';

    const dot = document.createElement('div');
    dot.className = 'streak-dot' + (hasA&&hasB?' done-AB':hasA?' done-A':hasB?' done-B':'') + (isToday?' today':'');
    dot.style.cssText = 'display:flex;align-items:center;justify-content:center;width:100%;aspect-ratio:1;';
    dot.innerHTML = icon;

    const lbl = document.createElement('div');
    lbl.className = 'streak-dlbl';
    lbl.textContent = dayLabel;

    col.append(dot, lbl);
    bar.appendChild(col);
  }
}

/* в”Ђв”Ђв”Ђ LAST SESSION в”Ђв”Ђв”Ђ */
function getLastSession(tab, exName){
  if(!exName||!exName.trim()) return null;
  for(const entry of getH()){
    if(entry.tab!==tab) continue;
    const ex=entry.exs.find(e=>e.name===exName);
    if(ex&&ex.sets.some(s=>s.reps!==''||s.kg!=='')) return {date:entry.date, sets:ex.sets};
  }
  return null;
}

/* в”Ђв”Ђв”Ђ REPEAT LAST в”Ђв”Ђв”Ђ */
function repeatLast(t){
  const last = getH().find(e => e.tab === t);
  if(!last){toast('Brak poprzedniego treningu');return;}
  if(S[t].length > 0 && !confirm('ZastД…piД‡ aktualny trening?')) return;
  // copy only names, fresh empty sets
  S[t] = last.exs.map(ex => ({name: ex.name, sets:[{reps:'',kg:''}], note:'', open:true}));
  saveS(); render();
  toast('Wczytano Д‡wiczenia z '+last.date);
}

/* в”Ђв”Ђв”Ђ RENDER в”Ђв”Ђв”Ђ */
function render(){
  ['A','B'].forEach(t=>{
    const c=document.getElementById('exl-'+t);
    c.innerHTML='';
    S[t].forEach((ex,i)=>c.appendChild(mkCard(t,i,ex)));
    document.getElementById('ct-'+t).textContent=S[t].length+' Д‡wiczeЕ„';
  });
}

function mkCard(t,i,ex){
  const card=document.createElement('div');
  card.className='exc'+(ex.open?' open':'');

  const head=document.createElement('div');
  head.className='exh';
  head.onclick=()=>toggleEx(t,i);
  const ni=document.createElement('input');
  ni.className='exni';ni.placeholder='Nazwa Д‡wiczeniaвЂ¦';ni.value=ex.name||'';
  ni.onclick=e=>e.stopPropagation();
  ni.oninput=e=>{S[t][i].name=e.target.value;saveS();updateCt(t);rebuildHint(card,t,i);};
  const ch=document.createElement('span');ch.className='exch';ch.textContent='вЊ„';
  head.append(ni,ch);
  card.appendChild(head);

  const hint=document.createElement('div');
  hint.className='last-hint';
  card.appendChild(hint);
  rebuildHintEl(hint,t,i,ex.name);

  const body=document.createElement('div');
  body.className='exb';
  body.innerHTML='<div class="exdiv"></div>';

  const tbl=document.createElement('table');
  tbl.className='stbl';
  tbl.innerHTML='<thead><tr><th>#</th><th>Powt.</th><th>kg</th><th></th></tr></thead>';
  const tbody=document.createElement('tbody');
  ex.sets.forEach((_,si)=>tbody.appendChild(mkSetRow(t,i,si,ex.sets[si])));
  tbl.appendChild(tbody);
  body.appendChild(tbl);

  const addSetBtn=document.createElement('button');
  addSetBtn.className='badd-set';addSetBtn.textContent='пј‹ Dodaj seriД™';
  addSetBtn.onclick=()=>{S[t][i].sets.push({reps:'',kg:''});saveS();render();};
  body.appendChild(addSetBtn);

  const note=document.createElement('textarea');
  note.className='notef';note.placeholder='NotatkiвЂ¦';note.value=ex.note||'';
  note.oninput=e=>{S[t][i].note=e.target.value;saveS();};
  body.appendChild(note);

  const delEx=document.createElement('button');
  delEx.className='bdel-ex';delEx.innerHTML='вњ• UsuЕ„ Д‡wiczenie';
  delEx.onclick=()=>{S[t].splice(i,1);saveS();render();};
  body.appendChild(delEx);

  card.appendChild(body);
  return card;
}

function rebuildHint(card,t,i){
  const hint=card.querySelector('.last-hint');
  if(hint) rebuildHintEl(hint,t,i,S[t][i].name);
}
function rebuildHintEl(hint,t,i,name){
  const last=getLastSession(t,name);
  if(!last){hint.style.display='none';return;}
  hint.style.display='';
  hint.innerHTML=`<div class="last-hint-label">Ostatni trening В· ${last.date}</div><div class="last-hint-sets">${
    last.sets.filter(s=>s.reps!==''||s.kg!=='').map((s,si)=>`<span class="lhs">S${si+1}: ${s.reps!==''?s.reps+'Г—':''}${s.kg!==''?s.kg+' kg':''}</span>`).join('')
  }</div>`;
}

function mkSetRow(t,exIdx,si,set){
  const tr=document.createElement('tr');

  const tdNum=document.createElement('td');
  tdNum.innerHTML=`<span class="snum">${si+1}</span>`;
  tr.appendChild(tdNum);

  // Reps drum
  const tdR=document.createElement('td');
  const dR=createDrum(REPS_OPTS, set.reps, val=>{S[t][exIdx].sets[si].reps=val;saveS();});
  dR.setLabel('POWT.');
  tdR.appendChild(dR.el);
  tr.appendChild(tdR);

  // KG drum
  const tdK=document.createElement('td');
  const dK=createDrum(KG_OPTS, set.kg, val=>{S[t][exIdx].sets[si].kg=val;saveS();});
  dK.setLabel('KG');
  tdK.appendChild(dK.el);
  tr.appendChild(tdK);

  const tdDel=document.createElement('td');
  const delBtn=document.createElement('button');
  delBtn.className='bdel';delBtn.textContent='Г—';
  delBtn.onclick=()=>{S[t][exIdx].sets.splice(si,1);saveS();render();};
  tdDel.appendChild(delBtn);
  tr.appendChild(tdDel);

  return tr;
}

/* в”Ђв”Ђв”Ђ MUTATIONS в”Ђв”Ђв”Ђ */
function addEx(t){
  S[t].push({name:'',sets:[{reps:'',kg:''}],note:'',open:true});
  saveS();render();
  setTimeout(()=>{
    const cards=document.querySelectorAll('#exl-'+t+' .exc');
    if(cards.length){
      cards[cards.length-1].scrollIntoView({behavior:'smooth',block:'center'});
      cards[cards.length-1].querySelector('.exni')?.focus();
    }
  },80);
}
function toggleEx(t,i){S[t][i].open=!S[t][i].open;saveS();render();}
function updateCt(t){document.getElementById('ct-'+t).textContent=S[t].length+' Д‡wiczeЕ„';}

/* в”Ђв”Ђв”Ђ SAVE в”Ђв”Ђв”Ђ */
function saveW(t){
  const exs=S[t].filter(e=>e.name.trim()||e.sets.some(s=>s.reps!==''||s.kg!==''));
  if(!exs.length){toast('Dodaj najpierw Д‡wiczenia!');return;}
  const dv=document.getElementById('dt-'+t).value;
  const dateStr=(dv?new Date(dv):new Date()).toLocaleDateString('pl-PL',{day:'2-digit',month:'short',year:'numeric'});
  const h=getH();
  h.unshift({tab:t,date:dateStr,iso:dv||new Date().toISOString().slice(0,10),
    exs:exs.map(e=>({name:e.name,sets:e.sets,note:e.note}))});
  setH(h.slice(0,120));
  S[t]=[];saveS();render();
  document.getElementById('dt-'+t).value=new Date().toISOString().slice(0,10);
  renderStreak();
  switchSub(t,'h');
  toast('Trening '+t+' zapisany вњ“');
}

/* в”Ђв”Ђв”Ђ HISTORY в”Ђв”Ђв”Ђ */
function renderHist(t){
  const c=document.getElementById('hist-'+t);
  const all=getH();
  const entries=all.filter(e=>e.tab===t);
  if(!entries.length){c.innerHTML='<div class="empty">Brak zapisanych treningГіw</div>';return;}
  c.innerHTML='';
  entries.forEach(e=>{
    const gi=all.indexOf(e);
    const div=document.createElement('div');
    div.className='he';
    div.innerHTML=`
      <div class="he-head">
        <div class="hd">${e.date}</div>
        <div class="he-actions">
          <button class="hbtn hbtn-edit">Edytuj</button>
          <button class="hbtn hbtn-del">UsuЕ„</button>
        </div>
      </div>
      ${e.exs.map(ex=>`
        <div class="hn">${x(ex.name||'(bez nazwy)')}</div>
        <div class="hs">${ex.sets.filter(s=>s.reps!==''||s.kg!=='').map((s,i)=>`<span class="sp">S${i+1}: ${s.reps!==''?s.reps+'Г—':''}${s.kg!==''?s.kg+' kg':''}</span>`).join('')}</div>
        ${ex.note?`<div class="hnote">${x(ex.note)}</div>`:''}
      `).join('')}`;
    div.querySelector('.hbtn-edit').onclick=()=>openEdit(gi,t);
    div.querySelector('.hbtn-del').onclick=()=>deleteEntry(gi,t);
    c.appendChild(div);
  });
}

function deleteEntry(idx,t){
  if(!confirm('UsunД…Д‡ ten trening?')) return;
  const h=getH();h.splice(idx,1);setH(h);
  renderHist(t);renderStreak();toast('Trening usuniД™ty');
}

/* в”Ђв”Ђв”Ђ EDIT MODAL в”Ђв”Ђв”Ђ */
let editIdx=null,editTab=null,editData=null;

function openEdit(idx,t){
  editIdx=idx;editTab=t;
  editData=JSON.parse(JSON.stringify(getH()[idx]));
  document.getElementById('modal-title').textContent='Edytuj В· '+editData.date;
  renderModalBody();
  document.getElementById('modal-bg').style.display='flex';
  document.body.style.overflow='hidden';
}
function renderModalBody(){
  const body=document.getElementById('modal-body');body.innerHTML='';
  editData.exs.forEach((ex,ei)=>{
    const exDiv=document.createElement('div');exDiv.className='modal-ex';
    const ni=document.createElement('input');ni.className='modal-ex-name';ni.value=ex.name||'';ni.placeholder='Nazwa Д‡wiczenia';
    ni.oninput=e=>{editData.exs[ei].name=e.target.value;};exDiv.appendChild(ni);
    ex.sets.forEach((s,si)=>{
      const row=document.createElement('div');row.className='modal-set-row';
      const num=document.createElement('div');num.className='modal-set-num';num.textContent=si+1;
      const rw=document.createElement('div');rw.className='modal-inp-wrap';
      const ri=document.createElement('input');ri.className='modal-inp';ri.type='number';ri.inputMode='numeric';ri.placeholder='вЂ”';ri.value=s.reps||'';
      ri.oninput=e=>{editData.exs[ei].sets[si].reps=e.target.value;};
      const rl=document.createElement('div');rl.className='modal-inp-lbl';rl.textContent='POWT.';rw.append(ri,rl);
      const kw=document.createElement('div');kw.className='modal-inp-wrap';
      const ki=document.createElement('input');ki.className='modal-inp';ki.type='number';ki.inputMode='decimal';ki.placeholder='вЂ”';ki.value=s.kg||'';
      ki.oninput=e=>{editData.exs[ei].sets[si].kg=e.target.value;};
      const kl=document.createElement('div');kl.className='modal-inp-lbl';kl.textContent='KG';kw.append(ki,kl);
      const del=document.createElement('button');del.className='modal-del-set';del.textContent='Г—';
      del.onclick=()=>{editData.exs[ei].sets.splice(si,1);renderModalBody();};
      row.append(num,rw,kw,del);exDiv.appendChild(row);
    });
    const as=document.createElement('button');as.className='modal-add-set';as.textContent='пј‹ Dodaj seriД™';
    as.onclick=()=>{editData.exs[ei].sets.push({reps:'',kg:''});renderModalBody();};exDiv.appendChild(as);
    const nt=document.createElement('textarea');nt.className='modal-note';nt.placeholder='NotatkiвЂ¦';nt.value=ex.note||'';
    nt.oninput=e=>{editData.exs[ei].note=e.target.value;};exDiv.appendChild(nt);
    if(ei<editData.exs.length-1){const dv=document.createElement('div');dv.className='modal-divider';body.appendChild(exDiv);body.appendChild(dv);}
    else body.appendChild(exDiv);
  });
}
function saveEdit(){
  const h=getH();h[editIdx]=editData;setH(h);
  closeModal();renderHist(editTab);toast('Zmiany zapisane вњ“');
}
function closeModal(e){
  if(e&&e.target!==document.getElementById('modal-bg'))return;
  document.getElementById('modal-bg').style.display='none';
  document.body.style.overflow='';
  editIdx=null;editTab=null;editData=null;
}

/* в”Ђв”Ђв”Ђ PROGRESS в”Ђв”Ђв”Ђ */
function fillSelect(t){
  const sel=document.getElementById('psel-'+t);
  const names=[...new Set(getH().filter(e=>e.tab===t).flatMap(e=>e.exs.map(ex=>ex.name)).filter(Boolean))];
  const cur=sel.value;
  sel.innerHTML='<option value="">вЂ” wybierz Д‡wiczenie вЂ”</option>'+names.map(n=>`<option value="${x(n)}"${n===cur?' selected':''}>${x(n)}</option>`).join('');
}
function renderProg(t){
  const name=document.getElementById('psel-'+t).value;
  const c=document.getElementById('pc-'+t);
  if(!name){c.innerHTML='<div class="empty">Wybierz Д‡wiczenie aby zobaczyД‡ progres.</div>';return;}
  const sorted=getH().filter(e=>e.tab===t).sort((a,b)=>a.iso.localeCompare(b.iso));
  const pts=[];
  sorted.forEach(entry=>{
    const ex=entry.exs.find(e=>e.name===name);if(!ex)return;
    const sets=ex.sets.filter(s=>s.reps!==''||s.kg!=='');if(!sets.length)return;
    const kgS=sets.filter(s=>s.kg!=='');
    const maxKg=kgS.length?Math.max(...kgS.map(s=>parseFloat(s.kg)||0)):null;
    const bS=sets.filter(s=>s.reps!==''&&s.kg!=='');
    const vol=bS.length?Math.round(bS.reduce((a,s)=>a+(parseFloat(s.kg)||0)*(parseFloat(s.reps)||0),0)):null;
    const e1rm=bS.length?(()=>{const b=bS.reduce((b,s)=>{const e=(parseFloat(s.kg)||0)*(1+(parseFloat(s.reps)||0)/30);return e>b.e?{e}:b;},{e:0});return Math.round(b.e*10)/10;})():null;
    const rS=sets.filter(s=>s.reps!=='');
    const maxR=rS.length?Math.max(...rS.map(s=>parseFloat(s.reps)||0)):null;
    pts.push({label:entry.date,maxKg,vol,e1rm,maxR});
  });
  if(!pts.length){c.innerHTML='<div class="empty">Brak danych dla tego Д‡wiczenia.</div>';return;}
  const hasKg=pts.some(p=>p.maxKg!==null),hasVol=pts.some(p=>p.vol!==null),has1rm=pts.some(p=>p.e1rm!==null),hasR=pts.some(p=>p.maxR!==null)&&!hasKg;
  const charts=[];
  if(hasKg)  charts.push({id:'ckg-'+t,  lbl:'Maksymalny ciД™Ејar (kg)',data:pts.map(p=>p.maxKg),color:'#c87c45'});
  if(has1rm) charts.push({id:'c1rm-'+t, lbl:'Szacowany 1RM (Epley)',data:pts.map(p=>p.e1rm), color:'#a08ec8'});
  if(hasVol) charts.push({id:'cvol-'+t, lbl:'ObjД™toЕ›Д‡ (kg Г— powt.)',data:pts.map(p=>p.vol),  color:'#7aad87'});
  if(hasR)   charts.push({id:'creps-'+t,lbl:'Maks. powt.',          data:pts.map(p=>p.maxR), color:'#7a9ec8'});
  c.innerHTML=charts.map(ch=>`<div class="cc"><div class="cl">${ch.lbl}</div><div class="cb"><canvas id="${ch.id}"></canvas></div></div>`).join('');
  const labels=pts.map(p=>p.label),grid='rgba(255,255,255,0.05)',tc='#52483e';
  charts.forEach(ch=>{
    if(CH[ch.id])CH[ch.id].destroy();
    CH[ch.id]=new Chart(document.getElementById(ch.id).getContext('2d'),{
      type:'line',data:{labels,datasets:[{data:ch.data,borderColor:ch.color,backgroundColor:ch.color+'18',pointBackgroundColor:ch.color,pointRadius:pts.length===1?5:3,pointHoverRadius:7,borderWidth:2,fill:true,tension:0.4,spanGaps:true}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#252219',borderColor:'#3a342b',borderWidth:1,titleColor:'#ede6da',bodyColor:'#8a7d6e',padding:10,cornerRadius:8}},
        scales:{x:{ticks:{color:tc,font:{size:10,family:'Outfit'},maxRotation:30,autoSkip:true,maxTicksLimit:6},grid:{color:grid},border:{color:'transparent'}},y:{ticks:{color:tc,font:{size:11,family:'Outfit'}},grid:{color:grid},border:{color:'transparent'}}}}
    });
  });
}

/* в”Ђв”Ђв”Ђ TOAST / UTILS в”Ђв”Ђв”Ђ */
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}
function x(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* в”Ђв”Ђв”Ђ INIT в”Ђв”Ђв”Ђ */
loadS();
if(!S.A)S.A=[];if(!S.B)S.B=[];
['A','B'].forEach(t=>{ document.getElementById('dt-'+t).value=new Date().toISOString().slice(0,10); });
render();
renderStreak();
</script>
